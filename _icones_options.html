<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
 body{margin:0;width:620px;font-family:"Manrope",sans-serif;background:radial-gradient(130% 60% at 50% -6%,#ffe7cf,#fdeadf 42%,#fbe9e3),#fcefe6;padding:28px 22px 40px;color:#6a6168}
 h1{font-family:"Fraunces",serif;color:#2a2230;font-size:1.45rem;margin:0 0 16px}
 h2{font-family:"Fraunces",serif;color:#2a2230;font-size:1.05rem;margin:20px 0 10px}
 .row{display:flex;gap:14px}
 .tile{text-align:center;width:92px}
 .tile .lbl{font-size:.72rem;font-weight:700;color:#7a6f76;margin-top:5px}
 /* Option A : tuile crème, icône colorée */
 .ta{width:62px;height:62px;border-radius:18px;margin:0 auto;display:grid;place-items:center;background:#fffaf2;box-shadow:0 8px 18px rgba(214,96,74,.14);border:1px solid rgba(214,96,74,.1)}
 /* Option B : rond coloré, blanc enrichi */
 .tb{width:62px;height:62px;border-radius:18px;margin:0 auto;display:grid;place-items:center;box-shadow:0 8px 18px rgba(214,96,74,.2)}
 .c-sun{background:linear-gradient(135deg,#FFC93C,#FF6A3D)} .c-green{background:linear-gradient(135deg,#5fe0c0,#1f9e8c)} .c-blue{background:linear-gradient(135deg,#7fb0ff,#4b7bff)} .c-gold{background:linear-gradient(135deg,#FFD15C,#E89B2B)} .c-purp{background:linear-gradient(135deg,#b3a0ff,#7a5cff)}
</style></head><body>
<h1>Icônes tuiles — 2 directions</h1>

<svg width="0" height="0" style="position:absolute"><defs>
 <linearGradient id="og" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FF8A3D"/><stop offset="1" stop-color="#FF5A4D"/></linearGradient>
 <linearGradient id="gg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFD15C"/><stop offset="1" stop-color="#E89B2B"/></linearGradient>
 <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#46d6b0"/><stop offset="1" stop-color="#1f9e8c"/></linearGradient>
 <radialGradient id="gloss" cx="38%" cy="28%" r="55%"><stop offset="0" stop-color="#fff" stop-opacity=".95"/><stop offset="1" stop-color="#fff" stop-opacity=".5"/></radialGradient>
</defs></svg>

<h2>Option A — icônes colorées sur tuile crème (l'icône porte la couleur)</h2>
<div class="row">
 <div class="tile"><div class="ta"><svg width="34" height="34" viewBox="0 0 32 32"><path d="M9 13.5h12.5a1.5 1.5 0 0 1 1.5 1.5v3.5a6.5 6.5 0 0 1-6.5 6.5h-2A6.5 6.5 0 0 1 8 18.5V14.5A1 1 0 0 1 9 13.5Z" fill="url(#og)"/><path d="M22.5 14.6h1.4a2.6 2.6 0 0 1 0 5.2h-1.1" fill="none" stroke="#E89B2B" stroke-width="2.4" stroke-linecap="round"/><path d="M12.5 5.5c-1 1.2-1 2.3 0 3.5M16 5c-1 1.2-1 2.3 0 3.5M19.5 5.5c-1 1.2-1 2.3 0 3.5" fill="none" stroke="#ffb274" stroke-width="2.4" stroke-linecap="round"/></svg></div><div class="lbl">Café</div></div>
 <div class="tile"><div class="ta"><svg width="34" height="34" viewBox="0 0 32 32"><path d="M25 6c0 9-4 15-12.5 15.5C9 21.7 7 19 7 15.5 7 9.6 12.6 6.5 25 6Z" fill="url(#tg)"/><path d="M7.5 26c2-6 6-11 14-17" fill="none" stroke="#0e6b5f" stroke-width="2.6" stroke-linecap="round" opacity=".5"/></svg></div><div class="lbl">Éco</div></div>
 <div class="tile"><div class="ta"><svg width="34" height="34" viewBox="0 0 32 32"><path d="M16 4.5c-4.7 0-8.5 3.7-8.5 8.3 0 5.8 6.6 12.4 8 13.7a.7.7 0 0 0 1 0c1.4-1.3 8-7.9 8-13.7 0-4.6-3.8-8.3-8.5-8.3Z" fill="url(#og)"/><circle cx="16" cy="12.8" r="3.4" fill="#fff"/></svg></div><div class="lbl">Près</div></div>
 <div class="tile"><div class="ta"><svg width="34" height="34" viewBox="0 0 32 32"><path d="M16 4.5l3.1 6.6 7.1.9c1 .1 1.4 1.3.7 2l-5.2 4.9 1.4 7c.2 1-.9 1.8-1.8 1.3L16 23.9l-6.3 3.3c-.9.5-2-.3-1.8-1.3l1.4-7-5.2-4.9c-.7-.7-.3-1.9.7-2l7.1-.9Z" fill="url(#gg)"/></svg></div><div class="lbl">Note</div></div>
 <div class="tile"><div class="ta"><svg width="34" height="34" viewBox="0 0 32 32"><path d="M16 3.5c1 4-2.5 5.5-4.5 8.5C9 15.6 8 18.4 8 21c0 4.6 3.6 7.5 8 7.5s8-2.9 8-7.5c0-3.8-2.3-6.5-4.3-9.2-.9 1.3-2 2-3.2 1.4 2-3.2.5-7-.5-9.7Z" fill="url(#og)"/><path d="M16 18c1.2 1 1.8 2.2 1.8 3.6 0 1.9-1.6 3-3.6 3" fill="none" stroke="#ffd15c" stroke-width="2.4" stroke-linecap="round"/></svg></div><div class="lbl">Populaire</div></div>
</div>

<h2>Option B — blanc enrichi (gloss + accent doré) sur tes ronds colorés</h2>
<div class="row">
 <div class="tile"><div class="tb c-sun"><svg width="34" height="34" viewBox="0 0 32 32"><path d="M9 13.5h12.5a1.5 1.5 0 0 1 1.5 1.5v3.5a6.5 6.5 0 0 1-6.5 6.5h-2A6.5 6.5 0 0 1 8 18.5V14.5A1 1 0 0 1 9 13.5Z" fill="#fff"/><path d="M22.5 14.6h1.4a2.6 2.6 0 0 1 0 5.2h-1.1" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="2.4" stroke-linecap="round"/><path d="M12.5 5.5c-1 1.2-1 2.3 0 3.5M16 5c-1 1.2-1 2.3 0 3.5M19.5 5.5c-1 1.2-1 2.3 0 3.5" fill="none" stroke="#ffe6a8" stroke-width="2.4" stroke-linecap="round"/><ellipse cx="13" cy="15" rx="5" ry="2.4" fill="url(#gloss)" opacity=".5"/></svg></div><div class="lbl">Café</div></div>
 <div class="tile"><div class="tb c-green"><svg width="34" height="34" viewBox="0 0 32 32"><path d="M25 6c0 9-4 15-12.5 15.5C9 21.7 7 19 7 15.5 7 9.6 12.6 6.5 25 6Z" fill="#fff"/><path d="M7.5 26c2-6 6-11 14-17" fill="none" stroke="#cfeee6" stroke-width="2.6" stroke-linecap="round"/><path d="M13 15c2 .3 4-.3 5.5-1.8" fill="none" stroke="#ffe6a8" stroke-width="2.2" stroke-linecap="round"/></svg></div><div class="lbl">Éco</div></div>
 <div class="tile"><div class="tb c-blue"><svg width="34" height="34" viewBox="0 0 32 32"><path d="M16 4.5c-4.7 0-8.5 3.7-8.5 8.3 0 5.8 6.6 12.4 8 13.7a.7.7 0 0 0 1 0c1.4-1.3 8-7.9 8-13.7 0-4.6-3.8-8.3-8.5-8.3Z" fill="#fff"/><circle cx="16" cy="12.8" r="3.4" fill="#ffd15c"/></svg></div><div class="lbl">Près</div></div>
 <div class="tile"><div class="tb c-gold"><svg width="34" height="34" viewBox="0 0 32 32"><path d="M16 4.5l3.1 6.6 7.1.9c1 .1 1.4 1.3.7 2l-5.2 4.9 1.4 7c.2 1-.9 1.8-1.8 1.3L16 23.9l-6.3 3.3c-.9.5-2-.3-1.8-1.3l1.4-7-5.2-4.9c-.7-.7-.3-1.9.7-2l7.1-.9Z" fill="#fff"/><path d="M16 9l1.8 3.8" stroke="#ffe6a8" stroke-width="2" stroke-linecap="round"/></svg></div><div class="lbl">Note</div></div>
 <div class="tile"><div class="tb c-purp"><svg width="34" height="34" viewBox="0 0 32 32"><path d="M16 3.5c1 4-2.5 5.5-4.5 8.5C9 15.6 8 18.4 8 21c0 4.6 3.6 7.5 8 7.5s8-2.9 8-7.5c0-3.8-2.3-6.5-4.3-9.2-.9 1.3-2 2-3.2 1.4 2-3.2.5-7-.5-9.7Z" fill="#fff"/><path d="M16 18c1.2 1 1.8 2.2 1.8 3.6 0 1.9-1.6 3-3.6 3" fill="none" stroke="#ffd15c" stroke-width="2.4" stroke-linecap="round"/></svg></div><div class="lbl">Populaire</div></div>
</div>
</body></html>
