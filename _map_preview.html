<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
 body{margin:0;font-family:sans-serif} #m{width:760px;height:680px}
 .epin{width:36px;height:36px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:grid;place-items:center;box-shadow:0 4px 10px rgba(0,0,0,.4);border:2.5px solid #fff}
 .epin>span{transform:rotate(45deg);font-size:17px;line-height:1}
 .epin.quest{animation:qp 2.4s ease-out infinite}
 @keyframes qp{0%{box-shadow:0 3px 8px rgba(0,0,0,.32),0 0 0 0 rgba(232,150,31,.55)}70%{box-shadow:0 3px 8px rgba(0,0,0,.32),0 0 0 13px rgba(232,150,31,0)}100%{box-shadow:0 3px 8px rgba(0,0,0,.32),0 0 0 0 rgba(232,150,31,0)}}
 .mappop-mini{text-align:center} .mappop-quest .mq-tag{display:inline-block;font-weight:800;font-size:.68rem;color:#fff;background:linear-gradient(135deg,#FFC93C,#FF8A3D);padding:.12rem .5rem;border-radius:999px;margin-bottom:.25rem}
 .mappop-quest .mq-rew{margin:.35rem 0;font-weight:800;font-size:.78rem;color:#B5740E}
 .mappop-btn{display:block;width:100%;margin-top:6px;background:#FF5A4D;color:#fff;border:0;border-radius:8px;padding:.4rem .6rem;font-weight:700;font-size:.8rem}
</style></head><body><div id="m"></div>
<script>
 const PTS=[
  {emoji:"🗼",lat:48.8584,lng:2.2945,title:"Tour Eiffel",desc:"Photographie la Dame de Fer.",xp:120,badge:"Photographe"},
  {emoji:"🎨",lat:48.8867,lng:2.3431,title:"Montmartre",desc:"Quartier des artistes.",xp:90,badge:"Culture"},
  {emoji:"⛪",lat:48.8530,lng:2.3499,title:"Notre-Dame",desc:"Île de la Cité.",xp:100,badge:"Photographe"},
  {emoji:"🖼️",lat:48.8606,lng:2.3376,title:"Louvre",desc:"Pyramide de verre.",xp:90,badge:"Culture"},
  {emoji:"⛵",lat:48.8585,lng:2.3373,title:"Seine",desc:"Pont des Arts.",xp:90,badge:"Explorateur"},
  {emoji:"☕",lat:48.8590,lng:2.3580,title:"Le Marais",desc:"Café avec un Mate.",xp:110,badge:"Ami local"},
  {emoji:"📚",lat:48.8525,lng:2.3470,title:"Quartier latin",desc:"Shakespeare & Co.",xp:70,badge:"Aventurier"},
  {emoji:"🗣️",lat:48.8709,lng:2.3674,title:"Canal St-Martin",desc:"Parle à un inconnu.",xp:100,badge:"Polyglotte"},
  {emoji:"🌳",lat:48.8462,lng:2.3372,title:"Luxembourg",desc:"Pause au jardin.",xp:80,badge:"Explorateur"},
  {emoji:"🏛️",lat:48.8738,lng:2.2950,title:"Arc de Triomphe",desc:"Champs-Élysées.",xp:60,badge:"Aventurier"},
 ];
 const map=L.map("m",{zoomControl:true}).setView([48.8606,2.3376],13);
 L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(map);
 function epin(emoji,bg,extra){return L.divIcon({className:"epin-wrap",html:'<div class="epin '+(extra||"")+'" style="background:'+bg+'"><span>'+emoji+'</span></div>',iconSize:[32,32],iconAnchor:[16,30],popupAnchor:[0,-28]});}
 PTS.forEach(q=>L.marker([q.lat,q.lng],{icon:epin(q.emoji,"#E8961F","quest")})
  .bindPopup('<div class="mappop-mini mappop-quest"><span class="mq-tag">⚡ Quête</span><br><b>'+q.title+'</b><br><span style="font-size:.74rem;color:#888">'+q.desc+'</span><div class="mq-rew">+'+q.xp+' XP · 🏅 '+q.badge+'</div><button class="mappop-btn">▶ Jouer cette quête</button></div>').addTo(map));
 setTimeout(()=>{ PTS[0] && map.openPopup('<div class="mappop-mini mappop-quest"><span class="mq-tag">⚡ Quête</span><br><b>Tour Eiffel</b><br><span style="font-size:.74rem;color:#888">Photographie la Dame de Fer.</span><div class="mq-rew">+120 XP · 🏅 Photographe</div><button class="mappop-btn">▶ Jouer cette quête</button></div>',[48.8584,2.2945]); },600);
 window.__ready=true;
</script></body></html>
