    <path d="M 78 86 A 104 104 0 0 1 220 70" fill="none" stroke="#FFFDF0" stroke-width="3.4" stroke-linecap="round" opacity=".95"/>
    <path d="M 234 196 A 104 104 0 0 1 150 256" fill="none" stroke="#FFE9A8" stroke-width="2" stroke-linecap="round" opacity=".5"/>

    ${rivetsSVG()}
    <circle cx="150" cy="150" r="82" fill="url(#disc-${bg})" filter="url(#inner-shadow)"/>
    <g clip-path="url(#discclip)">
      <g transform="translate(150 150) scale(1.62) translate(-32 -32)">${e.svg}</g>
      <circle cx="150" cy="150" r="82" fill="#fff" filter="url(#grain)"/>
    </g>
    <circle cx="150" cy="150" r="82" fill="url(#cab-rim)"/>
    <ellipse cx="126" cy="112" rx="36" ry="22" fill="url(#cab-spec)"/><ellipse cx="122" cy="106" rx="9" ry="5" fill="#fff" opacity=".85"/>
    <path d="M137 230a13 13 0 0 1 26 0" fill="none" stroke="#7a4a10" stroke-width="2.2"/><path d="M137 229a13 13 0 0 1 26 0" fill="none" stroke="#FFF2C0" stroke-width=".8"/>
    <g stroke="#7a4a10" stroke-width="1.5" stroke-linecap="round"><path d="M150 210v-6"/><path d="M133 215l-3-5"/><path d="M167 215l3-5"/></g>
   </g>
  </svg>`;
}

function makeMini(key){
  const e = EMBLEMS[key]; const bg = e.bg || e.family;
  return `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="47" fill="url(#gold-base)"/><circle cx="50" cy="50" r="47" fill="none" stroke="#8f5410" stroke-width="2"/><circle cx="50" cy="50" r="38" fill="url(#disc-${bg})"/><g clip-path="none"><g transform="translate(50 50) scale(1.02) translate(-32 -32)">${e.svg}</g></g><ellipse cx="40" cy="34" rx="16" ry="9" fill="#fff" opacity=".25"/></svg>`;
}

const keys = Object.keys(EMBLEMS);
document.getElementById('full').innerHTML = keys.map(k=>`<div class="cell">${makeBadge(k)}<div class="cap">${NAMES[k]}</div></div>`).join('');
document.getElementById('mini').innerHTML = keys.map(k=>`<div class="s">${makeMini(k)}<span>${NAMES[k]}</span></div>`).join('');
</script>
</body>
