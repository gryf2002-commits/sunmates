<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
 body{margin:0;width:640px;font-family:"Manrope",sans-serif;background:radial-gradient(130% 60% at 50% -6%,#ffe7cf,#fdeadf 42%,#fbe9e3),#fcefe6;padding:28px 22px 44px;color:#6a6168}
 h1{font-family:"Fraunces",serif;color:#2a2230;font-size:1.4rem;margin:0 0 14px}
 h2{font-family:"Fraunces",serif;color:#2a2230;font-size:1.02rem;margin:22px 0 12px}
 .row{display:flex;gap:16px;flex-wrap:wrap}
 .t{text-align:center;width:84px}
 .t .lbl{font-size:.72rem;font-weight:700;color:#7a6f76;margin-top:6px}
 /* ===== Option A : tuile-joyau ===== */
 .gem{position:relative;width:62px;height:62px;border-radius:20px;display:grid;place-items:center;margin:0 auto;isolation:isolate;
   box-shadow:0 7px 16px -4px rgba(255,90,77,.5),0 2px 4px rgba(180,60,40,.3),inset 0 0 0 .5px rgba(255,240,220,.25)}
 .gem::before{content:"";position:absolute;inset:0;border-radius:inherit;z-index:-2;
   background:radial-gradient(120% 90% at 28% 22%,rgba(255,255,255,.5) 0%,rgba(255,255,255,0) 40%),linear-gradient(135deg,var(--c1),var(--c2))}
 .gem::after{content:"";position:absolute;left:8%;right:8%;top:6%;height:42%;border-radius:50% 50% 60% 60%/70% 70% 100% 100%;
   background:linear-gradient(180deg,rgba(255,255,255,.55),rgba(255,255,255,.05));z-index:-1}
 .gem .rim{position:absolute;inset:0;border-radius:inherit;pointer-events:none;
   box-shadow:inset 0 1px 1px rgba(255,246,236,.85),inset 0 -2px 3px rgba(150,45,30,.35)}
 /* ===== Option B : tuile chaude claire + icône colorée ===== */
 .warm{position:relative;width:62px;height:62px;border-radius:20px;display:grid;place-items:center;margin:0 auto;
   background:radial-gradient(120% 90% at 30% 22%,#fff4e3,#ffd9b8 70%,#ffcaa3);
   box-shadow:0 7px 16px -5px rgba(255,138,61,.45),inset 0 1px 1px rgba(255,255,255,.7),inset 0 -2px 3px rgba(214,120,60,.2)}
</style></head><body>
<h1>Tuiles — 2 directions énergiques (zéro crème)</h1>

<svg width="0" height="0" style="position:absolute"><defs>
 <linearGradient id="og" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FF9D3D"/><stop offset="1" stop-color="#FF5A4D"/></linearGradient>
 <linearGradient id="gg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFCD4E"/><stop offset="1" stop-color="#E8961F"/></linearGradient>
 <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#46d6b0"/><stop offset="1" stop-color="#1f9e8c"/></linearGradient>
 <linearGradient id="vg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#a98fff"/><stop offset="1" stop-color="#7a5cff"/></linearGradient>
 <linearGradient id="iv" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFBF5"/><stop offset="1" stop-color="#FFE9D2"/></linearGradient>
 <filter id="idrop" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#7a2415" flood-opacity=".45"/></filter>
</defs></svg>

<h2>Option A — Tuile-joyau (dégradé sunset bombé + gloss) + icône ivoire + accent or</h2>
<div class="row">
 <div class="t"><div class="gem" style="--c1:#FF8A3D;--c2:#FF5A4D"><span class="rim"></span><svg width="32" height="32" viewBox="0 0 32 32" filter="url(#idrop)"><circle cx="16" cy="16" r="11" fill="none" stroke="url(#iv)" stroke-width="3"/><circle cx="16" cy="16" r="3" fill="#ffd15c" stroke="#fff" stroke-width=".8"/></svg></div><div class="lbl">Quêtes</div></div>
 <div class="t"><div class="gem" style="--c1:#FF7A59;--c2:#7a5cff"><span class="rim"></span><svg width="32" height="32" viewBox="0 0 32 32" filter="url(#idrop)"><path d="M10.5 10.5h11c3 0 5 2.3 5.6 5.4l.7 4.1c.4 2.4-1.3 4.5-3.6 4.5-1.4 0-2.3-.8-3-1.8l-.9-1.3a2 2 0 0 0-1.6-.9h-5.4a2 2 0 0 0-1.6.9l-.9 1.3c-.7 1-1.6 1.8-3 1.8-2.3 0-4-2.1-3.6-4.5l.7-4.1c.6-3.1 2.6-5.4 5.6-5.4Z" fill="url(#iv)"/><path d="M10.5 15v4M8.5 17h4" stroke="#E8961F" stroke-width="2.2" stroke-linecap="round"/><circle cx="20.5" cy="15.5" r="1.7" fill="#ffd15c"/><circle cx="23.5" cy="18.5" r="1.7" fill="#ffd15c"/></svg></div><div class="lbl">Jeux</div></div>
 <div class="t"><div class="gem" style="--c1:#ffd15c;--c2:#ffb274"><span class="rim"></span><svg width="32" height="32" viewBox="0 0 32 32" filter="url(#idrop)"><path d="M11 4.5l3 7.5M21 4.5l-3 7.5" fill="none" stroke="#FF5A4D" stroke-width="2.8" stroke-linecap="round"/><circle cx="16" cy="19.5" r="8.5" fill="url(#iv)"/><path d="M16 14.8l1.4 2.9 3.2.5-2.3 2.2.5 3.2-2.8-1.5-2.8 1.5.5-3.2-2.3-2.2 3.2-.5Z" fill="#E8961F"/></svg></div><div class="lbl">Badges</div></div>
 <div class="t"><div class="gem" style="--c1:#ff8a5c;--c2:#d96a3d"><span class="rim"></span><svg width="32" height="32" viewBox="0 0 32 32" filter="url(#idrop)"><path d="M9 13.5h12.5a1.5 1.5 0 0 1 1.5 1.5v3.5a6.5 6.5 0 0 1-6.5 6.5h-2A6.5 6.5 0 0 1 8 18.5V14.5A1 1 0 0 1 9 13.5Z" fill="url(#iv)"/><path d="M22.5 14.6h1.4a2.6 2.6 0 0 1 0 5.2h-1.1" fill="none" stroke="#E8961F" stroke-width="2.4" stroke-linecap="round"/><path d="M12.5 6c-1 1.2-1 2.3 0 3.5M16 5.5c-1 1.2-1 2.3 0 3.5M19.5 6c-1 1.2-1 2.3 0 3.5" fill="none" stroke="#ffd15c" stroke-width="2.4" stroke-linecap="round"/></svg></div><div class="lbl">Café</div></div>
 <div class="t"><div class="gem" style="--c1:#34c98f;--c2:#1f9e8c"><span class="rim"></span><svg width="32" height="32" viewBox="0 0 32 32" filter="url(#idrop)"><path d="M25 6c0 9-4 15-12.5 15.5C9 21.7 7 19 7 15.5 7 9.6 12.6 6.5 25 6Z" fill="url(#iv)"/><path d="M7.5 26c2-6 6-11 14-17" fill="none" stroke="#ffd15c" stroke-width="2.4" stroke-linecap="round"/></svg></div><div class="lbl">Éco</div></div>
 <div class="t"><div class="gem" style="--c1:#FF5A4D;--c2:#ffb274"><span class="rim"></span><svg width="32" height="32" viewBox="0 0 32 32" filter="url(#idrop)"><path d="M16 3.5c1 4-2.5 5.5-4.5 8.5C9 15.6 8 18.4 8 21c0 4.6 3.6 7.5 8 7.5s8-2.9 8-7.5c0-3.8-2.3-6.5-4.3-9.2-.9 1.3-2 2-3.2 1.4 2-3.2.5-7-.5-9.7Z" fill="url(#iv)"/><path d="M16 16c1.5 1.3 2.3 2.8 2.3 4.5 0 2.2-1.8 3.6-4.3 3.6" fill="none" stroke="#ffd15c" stroke-width="2.6" stroke-linecap="round"/></svg></div><div class="lbl">Populaire</div></div>
</div>

<h2>Option B — Tuile chaude claire (abricot, pas crème) + icône colorée</h2>
<div class="row">
 <div class="t"><div class="warm"><svg width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="11.5" fill="url(#og)"/><circle cx="16" cy="16" r="7.2" fill="#fff"/><circle cx="16" cy="16" r="3.2" fill="url(#og)"/></svg></div><div class="lbl">Quêtes</div></div>
 <div class="t"><div class="warm"><svg width="32" height="32" viewBox="0 0 32 32"><path d="M10.5 10.5h11c3 0 5 2.3 5.6 5.4l.7 4.1c.4 2.4-1.3 4.5-3.6 4.5-1.4 0-2.3-.8-3-1.8l-.9-1.3a2 2 0 0 0-1.6-.9h-5.4a2 2 0 0 0-1.6.9l-.9 1.3c-.7 1-1.6 1.8-3 1.8-2.3 0-4-2.1-3.6-4.5l.7-4.1c.6-3.1 2.6-5.4 5.6-5.4Z" fill="url(#vg)"/><path d="M10.5 15v4M8.5 17h4" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/><circle cx="20.5" cy="15.5" r="1.7" fill="#fff"/><circle cx="23.5" cy="18.5" r="1.7" fill="#fff"/></svg></div><div class="lbl">Jeux</div></div>
 <div class="t"><div class="warm"><svg width="32" height="32" viewBox="0 0 32 32"><path d="M11 4.5l3 7.5M21 4.5l-3 7.5" fill="none" stroke="#FF5A4D" stroke-width="2.8" stroke-linecap="round"/><circle cx="16" cy="19.5" r="8.5" fill="url(#gg)"/><path d="M16 14.8l1.4 2.9 3.2.5-2.3 2.2.5 3.2-2.8-1.5-2.8 1.5.5-3.2-2.3-2.2 3.2-.5Z" fill="#fff"/></svg></div><div class="lbl">Badges</div></div>
 <div class="t"><div class="warm"><svg width="32" height="32" viewBox="0 0 32 32"><path d="M9 13.5h12.5a1.5 1.5 0 0 1 1.5 1.5v3.5a6.5 6.5 0 0 1-6.5 6.5h-2A6.5 6.5 0 0 1 8 18.5V14.5A1 1 0 0 1 9 13.5Z" fill="url(#og)"/><path d="M22.5 14.6h1.4a2.6 2.6 0 0 1 0 5.2h-1.1" fill="none" stroke="#E8961F" stroke-width="2.4" stroke-linecap="round"/><path d="M12.5 6c-1 1.2-1 2.3 0 3.5M16 5.5c-1 1.2-1 2.3 0 3.5M19.5 6c-1 1.2-1 2.3 0 3.5" fill="none" stroke="#ffb274" stroke-width="2.4" stroke-linecap="round"/></svg></div><div class="lbl">Café</div></div>
 <div class="t"><div class="warm"><svg width="32" height="32" viewBox="0 0 32 32"><path d="M25 6c0 9-4 15-12.5 15.5C9 21.7 7 19 7 15.5 7 9.6 12.6 6.5 25 6Z" fill="url(#tg)"/><path d="M7.5 26c2-6 6-11 14-17" fill="none" stroke="#d9fff2" stroke-width="2.4" stroke-linecap="round" opacity=".85"/></svg></div><div class="lbl">Éco</div></div>
 <div class="t"><div class="warm"><svg width="32" height="32" viewBox="0 0 32 32"><path d="M16 3.5c1 4-2.5 5.5-4.5 8.5C9 15.6 8 18.4 8 21c0 4.6 3.6 7.5 8 7.5s8-2.9 8-7.5c0-3.8-2.3-6.5-4.3-9.2-.9 1.3-2 2-3.2 1.4 2-3.2.5-7-.5-9.7Z" fill="url(#og)"/><path d="M16 16c1.5 1.3 2.3 2.8 2.3 4.5 0 2.2-1.8 3.6-4.3 3.6" fill="none" stroke="#ffd15c" stroke-width="2.6" stroke-linecap="round"/></svg></div><div class="lbl">Populaire</div></div>
</div>
</body></html>
