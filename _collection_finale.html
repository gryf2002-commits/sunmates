<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SunMates — Collection finale</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
 body{margin:0;width:980px;font-family:"Manrope",sans-serif;background:radial-gradient(130% 60% at 50% -6%, #ffe7cf 0%, #fdeadf 42%, #fbe9e3 100%), #fcefe6;padding:32px 24px 48px;color:#6a6168}
 h1{font-family:"Fraunces",serif;color:#2a2230;font-size:1.6rem;margin:0 0 2px}
 .sub{color:#a99fa6;font-size:.9rem;margin:0 0 22px}
 h2{font-family:"Fraunces",serif;color:#2a2230;font-size:1.1rem;margin:24px 0 10px}
 .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
 .c{text-align:center} .c .nm{font-size:.72rem;color:#7a6f76;font-weight:700;margin-top:-4px} .c .fa{font-size:.62rem;color:#bba}
 .mini{display:flex;flex-wrap:wrap;gap:12px;align-items:center;background:#fffdfa;border:1px solid rgba(120,80,70,.08);border-radius:16px;padding:14px}
 .mini .m{text-align:center} .mini .m span{display:block;font-size:.6rem;color:#a99fa6;margin-top:2px}
 .locked .smbadge-svg{filter:grayscale(.9) opacity(.5)}
</style></head>
<body>
<h1>Collection SunMates — 22 badges, 5 mondes</h1>
<p class="sub">Chaque famille sa DA · secrets en galaxie animée · généré par sunmates-badges.js (le moteur qui ira dans l'app).</p>
<div id="grid" class="grid"></div>
<h2>Verrouillés (grisés via CSS) + secret « ??? » + mini (lite)</h2>
<div id="states" class="mini"></div>
<script src="sunmates-badges.js?v=1"></script>
<script>
 var SECRET = {globetrotter:1, butterfly:1, legend:1, guardian:1, nightowl:1};
 var NAMES = {globetrotter:'Globe-trotter',explorer:'Explorateur',explorer5:'Routard',questmaster:'Aventurier',welcome:'Premier Pas',firstcheckin:'Check-in',adventure:'Tête Brûlée',coffee:'Café',photographer:'Photographe',culture:'Culture',butterfly:'Papillon',local:'Ami local',polyglot:'Polyglotte',guardian:'Ange gardien',guardian_helper:'Veilleur',verified:'Vérifié',legend:'Légende',profile100:'Profil top',reviewer:'Critique',foodie:'Foodie',night:'Night Rider',nightowl:'Oiseau nuit'};
 var FA = {exploration:'Exploration',social:'Social',securite:'Sécurité',accomplissement:'Accompl.',secret:'Secret'};
 var order = ['explorer','explorer5','questmaster','welcome','firstcheckin','adventure','coffee','photographer','culture','local','polyglot','guardian_helper','verified','profile100','reviewer','foodie','night','globetrotter','butterfly','legend','guardian','nightowl'];
 var fam = {exploration:'exploration',social:'social',securite:'securite',accomplissement:'accomplissement'};
 document.getElementById('grid').innerHTML = order.map(function(k){
   var sec = !!SECRET[k];
   var svg = SMBadge(k,{secret:sec, size:160});
   var faLabel = sec ? FA.secret : (FA[ ({globetrotter:'exploration'})[k] ] || '');
   return '<div class="c">'+svg+'<div class="nm">'+(NAMES[k]||k)+'</div><div class="fa">'+(sec?'Secret':'')+'</div></div>';
 }).join('');
 document.getElementById('states').innerHTML =
   '<div class="m locked">'+SMBadge('coffee',{size:84})+'<span>verrouillé</span></div>'+
   '<div class="m locked">'+SMBadge('verified',{size:84})+'<span>verrouillé</span></div>'+
   '<div class="m">'+SMBadge('legend',{secret:true,locked:true,size:84})+'<span>secret ???</span></div>'+
   '<div class="m">'+SMBadge('globetrotter',{secret:true,size:56})+'<span>mini secret</span></div>'+
   '<div class="m">'+SMBadge('explorer',{size:48})+'<span>mini 48</span></div>'+
   '<div class="m">'+SMBadge('guardian_helper',{size:40})+'<span>mini 40</span></div>'+
   '<div class="m">'+SMBadge('foodie',{size:40})+'<span>mini 40</span></div>'+
   '<div class="m">'+SMBadge('butterfly',{secret:false,size:40})+'<span>mini 40</span></div>';
</script>
</body></html>
