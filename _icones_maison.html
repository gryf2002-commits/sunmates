<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SunMates — Icônes maison</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
 body{margin:0;width:760px;font-family:"Manrope",sans-serif;background:radial-gradient(130% 60% at 50% -6%,#ffe7cf,#fdeadf 42%,#fbe9e3),#fcefe6;padding:30px 24px 44px;color:#6a6168}
 h1{font-family:"Fraunces",serif;color:#2a2230;font-size:1.5rem;margin:0 0 18px}
 h2{font-family:"Fraunces",serif;color:#2a2230;font-size:1.05rem;margin:22px 0 10px}
 .row{display:flex;flex-wrap:wrap;gap:16px}
 .tile{text-align:center;width:96px}
 .cic{width:60px;height:60px;border-radius:18px;display:grid;place-items:center;margin:0 auto 6px;box-shadow:0 8px 18px rgba(214,96,74,.2)}
 .c-sun{background:linear-gradient(135deg,#FFC93C,#FF6A3D)} .c-green{background:linear-gradient(135deg,#5fe0c0,#1f9e8c)} .c-blue{background:linear-gradient(135deg,#7fb0ff,#4b7bff)} .c-gold{background:linear-gradient(135deg,#FFD15C,#E89B2B)} .c-purp{background:linear-gradient(135deg,#b3a0ff,#7a5cff)}
 .tile span{font-size:.74rem;font-weight:700;color:#7a6f76}
 .warm{display:flex;gap:18px;align-items:center;background:#fffdfa;border:1px solid rgba(120,80,70,.1);border-radius:16px;padding:16px}
 .warmcell{text-align:center} .warmbar{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid rgba(120,80,70,.12);border-radius:14px;padding:10px 14px;box-shadow:0 6px 16px rgba(214,96,74,.08);color:#a99fa6;font-size:.85rem}
</style></head><body>
<h1>Icônes maison — dans la DA</h1>
<h2>Tuiles (blanc sur rond coloré)</h2>
<div class="row" id="tiles"></div>
<h2>Autonomes (chaudes) — en situation</h2>
<div class="warm" id="warm"></div>
<script src="sunmates-icons.js?v=1"></script>
<script>
 var tiles=[['coffee','c-sun','Café'],['eco','c-green','Éco'],['near','c-blue','Près'],['rating','c-gold','Note'],['popular','c-purp','Populaire'],['quest','c-sun','Quêtes'],['games','c-purp','Jeux'],['medal','c-gold','Badges'],['coupon','c-green','Coupons'],['rank','c-blue','Classement']];
 document.getElementById('tiles').innerHTML = tiles.map(function(t){return '<div class="tile"><div class="cic '+t[1]+'">'+SMIcon(t[0],{size:30})+'</div><span>'+t[2]+'</span></div>';}).join('');
 document.getElementById('warm').innerHTML =
   '<div class="warmbar" style="flex:1">'+SMIcon('search',{size:20})+'Rechercher un lieu ou un·e voyageur·se…</div>'+
   '<div class="warmcell">'+SMIcon('bell',{size:26})+'<div style="font-size:.7rem">cloche</div></div>';
</script>
</body></html>
